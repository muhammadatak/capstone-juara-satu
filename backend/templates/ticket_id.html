<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket ID</title>
  </head>
  <body style="margin: 0;
               padding: 0;
               font-family: Arial, Helvetica, sans-serif;
               background-color: #f4f4f4">
    <table role="presentation"
           width="100%"
           cellspacing="0"
           cellpadding="0"
           style="background-color: #f4f4f4;
                  padding: 20px 0">
      <tr>
        <td align="center">
          <table role="presentation"
                 width="600"
                 cellspacing="0"
                 cellpadding="0"
                 style="background-color: #ffffff;
                        border-radius: 8px;
                        overflow: hidden">
            <!-- Header -->
            <tr>
              <td style="background-color: #527c9f; padding: 30px; text-align: center;">
                <h1 style="margin: 0; color: #ffffff; font-size: 24px;">Cumb Niaga</h1>
              </td>
            </tr>
            <!-- Body -->
            <tr>
              <td style="padding: 40px 30px;">
                <h2 style="margin: 0 0 20px 0; color: #333333; font-size: 20px;">Ticket Id</h2>
                <p style="margin: 0 0 15px 0;
                          color: #555555;
                          font-size: 16px;
                          line-height: 1.5">Hi {{ fullname }},</p>
                <p style="margin: 0 0 25px 0;
                          color: #555555;
                          font-size: 16px;
                          line-height: 1.5">
                  Kamu telah mengirim ticket ini id ticket anda
                </p>
                            <!-- Ticket ID -->
            <table role="presentation"
                cellspacing="0"
                cellpadding="0"
                style="margin: 0 auto 25px auto;">
            <tr>
                <td style="
                    background-color: #f4f4f4;
                    border: 1px solid #dcdcdc;
                    border-radius: 5px;
                    padding: 15px 30px;
                    text-align: center;
                    font-size: 16px;
                    color: #333333;
                    font-weight: bold;
                ">
                Ticket ID: {{ ticket_uuid }}
                </td>
            </tr>
            </table>
               
            <!-- Footer -->
            <tr>
              <td style="background-color: #f8f9fa;
                         padding: 20px 30px;
                         text-align: center;
                         border-top: 1px solid #eeeeee">
                <p style="margin: 0; color: #999999; font-size: 12px;">
                  This is an automated message from Cumb Niaga.
                  <br>
                  Please do not reply to this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
